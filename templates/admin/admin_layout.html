<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المدير - المعهد العالي للعلوم والتقنية أمساعد</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }

        /* القائمة الجانبية */
        .sidebar { 
            background: #002244; 
            min-height: 100vh; 
            color: white; 
            width: 280px; 
            position: fixed;
            right: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: -4px 0 10px rgba(0,0,0,0.1);
        }

        .nav-container { flex-grow: 1; overflow-y: auto; }
        .nav-link { 
            color: rgba(255,255,255,0.7); 
            margin: 5px 15px; 
            border-radius: 10px; 
            font-size: 1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }
        .nav-link i { font-size: 1.2rem; margin-left: 10px; }
        .nav-link:hover, .nav-link.active { background: rgba(255,255,255,0.1); color: white; }

        .logout-section { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-logout {
            width: 100%; background: #dc3545; color: white; border: none;
            padding: 12px; border-radius: 10px; text-decoration: none;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; transition: 0.3s;
        }
        .btn-logout:hover { background: #b02a37; color: white; }

        /* المحتوى الرئيسي */
        .main-content { margin-right: 280px; padding: 40px; min-height: 100vh; }
        .institute-name { font-size: 0.9rem; color: #00d4ff; display: block; margin-top: 8px; font-weight: bold; }

        /* تحسين العرض على الشاشات الصغيرة */
        @media (max-width: 992px) {
            .sidebar { width: 220px; }
            .main-content { margin-right: 220px; padding: 30px; }
        }
        @media (max-width: 768px) {
            .sidebar { 
                position: relative; 
                width: 100%; 
                min-height: auto; 
                flex-direction: row; 
                box-shadow: none;
            }
            .nav-container { flex-direction: row; overflow-x: auto; }
            .nav-link { font-size: 0.9rem; margin: 5px; padding: 10px; }
            .main-content { margin-right: 0; padding: 20px; }
            .btn-logout { padding: 8px; font-size: 0.9rem; }
        }
        @media (max-width: 576px) {
            .nav-link { font-size: 0.8rem; }
            .btn-logout { width: 100%; margin-top: 10px; }
            .main-content { padding: 15px; }
        }

        /* الجداول المتجاوبة في كل واجهات المدير */
        .table-responsive { overflow-x: auto; }
        @media (max-width: 992px) {
            .table th, .table td { font-size: 0.9rem; white-space: nowrap; }
        }
        @media (max-width: 768px) {
            .table th, .table td { font-size: 0.85rem; white-space: nowrap; }
            .table { min-width: 700px; }
        }
        @media (max-width: 576px) {
            .table th, .table td { font-size: 0.75rem; }
            .table { min-width: 800px; }
            .btn-action { width: 100%; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column flex-md-column">
        <div class="p-4 text-center border-bottom border-secondary border-opacity-25 mb-3">
            <img src="{{ url_for('static', filename='images/logo.webp') }}" width="80" class="mb-2">
            <h6 class="fw-bold mb-0">لوحة الإدارة</h6>
            <small class="institute-name">المعهد العالي للعلوم والتقنية<br>أمساعد</small>
        </div>
        
        <div class="nav-container mt-2">
            <nav class="nav flex-column flex-md-column">
                <a href="{{ url_for('admin_dashboard') }}" class="nav-link py-3">
                    <i class="bi bi-people"></i> أعضاء هيئة التدريس
                </a>
                <a class="nav-link py-3" href="{{ url_for('admin_reports') }}">
                    <i class="bi bi-graph-up-arrow"></i> التقارير والإحصائيات
                </a>
                <a class="nav-link py-3" href="/admin/subjects">
                    <i class="bi bi-book"></i> إدارة المواد
                </a>
                <a class="nav-link py-3" href="/admin/monitor">
                    <i class="bi bi-eye"></i> مراقبة المذكرات
                </a>
            </nav>
        </div>

        <div class="logout-section">
            <a href="/logout" class="btn-logout">
                <i class="bi bi-box-arrow-right"></i> تسجيل الخروج
            </a>
        </div>
    </div>

    <div class="main-content">
        {% if ai_alert %}
        <div class="alert alert-info rounded-4 shadow-sm mb-4">
            <i class="bi bi-lightbulb me-2"></i>
            {{ ai_alert }}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
